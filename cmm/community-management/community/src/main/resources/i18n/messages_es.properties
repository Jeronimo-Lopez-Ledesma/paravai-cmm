# -------------------------------------------------
# Community Exceptions (basadas en CustomException)
# Usado por:
# - CommunityNotFoundException
# - ForbiddenCommunityOperationException
# - DuplicateCommunityBusinessIdentityException
#
# Formato de clave: community.error.<TYPE>
# -------------------------------------------------

# Lanzada cuando no se puede encontrar una comunidad por su ID
# Args:
#   {0} = communityId
community.error.notFound = Comunidad no encontrada: {0}

# Lanzada cuando un usuario intenta realizar una operación sin privilegios suficientes
# Args:
#   {0} = operación
#   {1} = userId
#   {2} = communityId
community.error.forbiddenOperation = Operación prohibida {0} para el usuario {1} en la comunidad {2}

# Lanzada cuando ya existe una comunidad con la misma identidad de negocio (tenantId + slug)
# Args:
#   {0} = tenantId
#   {1} = slug
community.error.duplicateBusinessIdentity = Ya existe una comunidad para el tenant {0} con el slug {1}